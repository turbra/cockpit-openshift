<!DOCTYPE html>
<html lang="en">
<head>
    <title>OpenShift clusters</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="cockpit-openshift.css" />
    <script src="../base1/cockpit.js"></script>
</head>
<body class="pf-v6-m-tabular-nums" data-page="clusters">
    <div id="app" class="console-page">
        <header class="fleet-header">
            <div class="fleet-header__main">
                <nav class="breadcrumb-nav breadcrumb-nav--compact" aria-label="Breadcrumb">
                    <span class="breadcrumb-nav__crumb">OpenShift</span>
                    <span class="breadcrumb-nav__separator">/</span>
                    <span class="breadcrumb-nav__crumb">Fleet management</span>
                    <span class="breadcrumb-nav__separator">/</span>
                    <span class="breadcrumb-nav__current">Clusters</span>
                </nav>
                <h1 class="fleet-title">Clusters</h1>
            </div>
            <button id="clusters-refresh-button" class="icon-button" type="button" aria-label="Refresh cluster inventory" title="Refresh">
                <span aria-hidden="true">&#x21bb;</span>
            </button>
        </header>

        <nav class="fleet-tabs" aria-label="Cluster inventory views">
            <button id="cluster-list-tab" class="fleet-tabs__tab fleet-tabs__tab--active" type="button" aria-current="page">Cluster List</button>
        </nav>

        <section class="fleet-panel">
            <div class="fleet-toolbar" aria-label="Cluster inventory toolbar">
                <div class="fleet-toolbar__search">
                    <input id="clusters-search" class="text-input fleet-search-input" type="search" autocomplete="off" placeholder="Filter by name or ID..." aria-label="Filter by name or ID" />
                </div>
                <div class="fleet-toolbar__filter">
                    <label class="fleet-toolbar__label" for="cluster-type-filter">Cluster type</label>
                    <select id="cluster-type-filter" class="select-input fleet-filter-select">
                        <option value="all">All clusters</option>
                        <option value="compact">Compact</option>
                        <option value="sno">Single node</option>
                        <option value="unknown">Other</option>
                    </select>
                </div>
                <div class="fleet-toolbar__actions">
                    <a class="action-button action-button--secondary fleet-toolbar__button" href="microshift.html">Install MicroShift</a>
                    <a class="action-button action-button--primary fleet-toolbar__button" href="create.html">Create cluster</a>
                </div>
            </div>

            <div class="inventory-table__meta fleet-table-meta">
                <div id="clusters-result-count" class="field-helper">0 clusters</div>
            </div>

            <div id="clusters-empty" class="empty-state fleet-empty-state" hidden>
                No clusters match the current filters.
            </div>

            <div class="inventory-table__shell fleet-table-shell">
                <table class="inventory-table inventory-table--compact" aria-label="OpenShift cluster inventory">
                    <thead>
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Status</th>
                            <th scope="col">Type</th>
                            <th scope="col">Created</th>
                            <th scope="col">Version</th>
                            <th scope="col">Provider</th>
                            <th scope="col" class="inventory-table__actions-column" aria-label="Actions"></th>
                        </tr>
                    </thead>
                    <tbody id="cluster-table-body"></tbody>
                </table>
            </div>

            <div class="fleet-pagination" aria-label="Pagination controls">
                <div id="pagination-summary" class="field-helper">0 - 0 of 0</div>
                <div class="fleet-pagination__controls">
                    <label class="fleet-pagination__page-size" for="page-size-select">
                        <span class="fleet-toolbar__label">Rows per page</span>
                        <select id="page-size-select" class="select-input fleet-page-size-select">
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                        </select>
                    </label>
                    <button id="page-prev-button" class="icon-button icon-button--small" type="button" aria-label="Previous page" title="Previous page">
                        <span aria-hidden="true">&#x2039;</span>
                    </button>
                    <button id="page-next-button" class="icon-button icon-button--small" type="button" aria-label="Next page" title="Next page">
                        <span aria-hidden="true">&#x203a;</span>
                    </button>
                </div>
            </div>
        </section>
        <div id="row-action-menu-root"></div>
    </div>

    <script src="cluster-list.js"></script>
</body>
</html>
